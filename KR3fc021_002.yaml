body:
  text: 算算法十四異乘同除詳明算法歌曰異乘同除法何如物賣錢來做例兒先下原錢乘只物却將原物法徐之將錢買物互乘取百里千斤以類推算者留心能善用一絲一忽不差池九章算經今有絲一斤價直二百四十今有錢一千三百二十八問得絲幾何答曰五斤八兩一十二銖五分銖之四術曰以一斤價數為法以一斤乘今有錢數為實實如法得絲數按此術今有之義以一斤價為所有率一斤為所求率今有錢為所有數而今有之即得今有絲一斤價直三百四十五今有絲七兩一十二銖問得錢幾何答曰一百六十一錢三十二分錢之二十三術曰以一斤銖數為法以一斤價數乘七兩一十二銖為實實如法得
