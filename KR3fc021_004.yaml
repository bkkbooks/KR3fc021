body:
  text: 錢數按此術亦今有之義以絲一斤數為所有率價錢為所求率今有絲為所有數而今有之即得今有縑一丈價直一百二十八今有縑一匹九尺五寸問得錢幾何答曰六百三十三錢五分錢之三術曰以一丈寸數為法以價錢數乘今有縑寸數為實實如法得錢數淳風等按此術亦今有之義以縑一丈寸數為所有率價錢為所求率今有縑寸數為所有數而今有之即得今有布一匹價直一百二十五今有布二丈七尺問得錢幾何答曰八十四錢八分錢之三術曰以一匹尺數為法今有布尺數乘價錢為實實如法得錢數按此術亦今有之義以一匹尺數為所有率價錢為所求率今有布為所有數今有之即得今有素一匹一丈價直六百二十五今有錢五百問得素幾何答曰得素一匹術曰以價直為法以一匹一丈尺數乘今有錢數為實實如法得素數按此術亦今有之義以價錢為所有率以丈尺數為所求率今有錢為
