body:
  text: 所有數今有之即得今有與人絲一十四斤約得縑一十斤今與人絲四十五斤八兩問得縑幾何答曰三十二斤八兩術曰以一十四斤兩數爲法以一十斤乗今有絲兩數爲實實如法得縑數此術亦今有之義以一十四斤兩數爲所有率一十斤為所求率今有絲爲所有數而今有之即得今有絲一斤耗七兩今有絲二十三斤五兩問耗幾何答曰一百六十三兩四銖半術曰以一斤展十六兩爲法以七兩乗今有絲兩數爲實實如法得耗數按此術亦今有之義以一斤爲十六兩為所有率七兩為所求率今有絲為所有數而今有之即得今有生絲三十斤乾之耗三斤十二兩今有乾絲一十二斤問生絲幾何答曰一十三斤一十一兩十銖七分銖之二術曰置生絲兩數除耗數餘以爲法餘四百二十兩即乾絲率三十斤乗乾絲兩數爲實實如法得生絲數凡所得率如細則俱細麄則俱麄
