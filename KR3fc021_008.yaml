body:
  text: 兩數相抱而已故品物不同如上縑絲之比相與乘為三十斤凡四百八十兩今生絲率四百八十兩今乾絲率四百二十兩則其數相通可俱為銖可俱為兩可俱為斤無所歸滯也若然冝以所有乾絲斤數乘生絲兩數為實今以斤兩錯互而亦同歸者使乾絲以兩數為率生絲以類為率譬之異類亦各有一定之勢淳風等按此術置生絲兩數除耗數餘即乾絲之率於今有術為所有率三十斤為所求率乾絲兩數為所有數凡所為率者細則俱細粗則俱粗今有一斤乘兩知乾絲即以兩數為率生絲即以斤數為率譬之異物各有一定之率也夏候陽算經今有醋三升給七兵見有四百五十七斛問給幾何答曰給兵十萬六千六百三十三人三分人之一術曰置醋數再上十之為升以七因之入以三升除之即得今有兵八萬人凡五兵共給醬二升問日給幾何答曰日給三百二十斛術曰置兵數以二因之得一十六萬以五兵除之得醬數今有醬二升給五兵見有三百二十斛問給幾何答曰給兵八萬人
