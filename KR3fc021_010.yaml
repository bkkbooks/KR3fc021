body:
  text: 術曰置醬數再上十之為升以五因之得一十六萬以二升為法除之即得今有兵四萬八千六百二十五人人凡五日給塩二升問一月幾何答曰一月五千八百三十五斛術曰置兵數以二因之退二等得五日塩數九百七十二斛五斗求一月數以六因之今有錢一十七貫五百二十五文欲五文買鷄三隻問得幾何答曰得鷄一萬五百一十五隻術曰置錢數以三因之五而一即得五曹筭経今有錢二十七貫八百三十三文凡五文買梨三枚問幾何答曰一萬六千六百九十九枚竒四文術曰列錢二十七貫八百三十三文以三乗之得八萬三千四百九十九以五除之今有九錢五文買雉三隻有錢一萬七千五百二十五文問得雉幾何答曰一萬五百一十五隻術曰列錢數一萬七千五百二十五文以雉三隻乗之得五萬二千五
