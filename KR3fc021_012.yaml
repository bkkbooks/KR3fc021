body:
  text: 百七十五文以五文除之即得楊輝摘竒算法應用算法以徑乘代互換者固善其間又有不可代者冝兩存之變換活法遇一除者定位只乘不除二為除者定位乘訖折半二乘三除置積減五三乘三除不乘除只定位四乘三除互換五乘三除六乘三除二因七乘三除八乘三除互換九乘三除定位三因米三斗四升換粟五斗二升今有米二百三十八石問計粟幾何答曰三百六十四石解題米粟為問互換為法互換術曰以所求率乘所有數為實以所有率為法實如法而一以所求率乘所有數者乃商除之法也其數有分子今法徑以所求率乘所有之數是要者為乘以原有數為法是不要者為除是總乘總除免分子之繁也
