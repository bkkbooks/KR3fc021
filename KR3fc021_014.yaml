body:
  text: 草曰以所求率粟五斗二升乘所有數為實乘米二百三十八石得一百二十三石七斗六升以所有率為法米三斗四升實如法而一除得三百六十四石合問金立方一寸謂長闊髙皆是十分再自乘得一千分重一斤即十六兩今有金立方七分謂長闊髙皆是七分再自乘得三百四十三分問重幾何答曰五兩四錢八分八釐互換術曰以所求率金方七分積三百四十三分乘所有數金十六兩為實以原率金方一寸積一千分為法除之合問二百三十四斤每三斤直六百問錢幾何答曰四十六貫八百文代術用二百乘斤數六百買三斤知每斤二百不必互換二百三十四人每三人支七貫問計幾錢答曰五百四十六貫文互換術曰置人數以七貫乘之三人除之二乘四除五因三乘四除加五折半四乘四除不乘除五乘四除五七乘四除互換八乘四除二因九乘四除互換又兩度加五
