body:
  text: 二十八人每四人支銀七兩問共支幾何答曰四十九兩互換術曰置人數以七兩乗之四人除之又術一兩七錢五分乗人數四人分七兩可以四除二乗五除四因積三乗五除六因積四乗五除八因積五乗五除不乗除六乗五除加二七乗五除加四八乗五除加六九乗五除加八二百一十六人每五十人支銀五兩問共幾何答曰二十一兩六錢五十人支銀五兩即是每人得銀一錢不必乗除置人數二百一十六人於人上定錢二乗六除置積三除三乗六除折半四乗六除置積减五五乗六除互換六乗六除不乗除七乗六除互換八乗六除七十五除九乗六除加五互換遇七數者無折變仍從互換二乗八除兩折半三乗八除三因加二五四乗八除折半五乗八除减六六乗八除七十五乗之七乗八除七因加二五八乗八除不乗除九乗八除九因加二五互換遇九者無折變從本法
