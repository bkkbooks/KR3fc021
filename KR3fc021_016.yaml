body:
  text: 二十八人每四人支銀七兩問共支幾何答曰四十九兩互換術曰置人數以七兩乘之四人除之又術一兩七錢五分乘人數四人分七兩可以四除二乘五除四因積三乘五除六因積四乘五除八因積五乘五除不乘除六乘五除加二七乘五除加四八乘五除加六九乘五除加八二百一十六人每五十人支銀五兩問共幾何答曰二十一兩六錢五十人支銀五兩即是每人得銀一錢不必乘除置人數二百一十六人於人上定錢二乘六除置積三除三乘六除折半四乘六除置積减五五乘六除互換六乘六除不乘除七乘六除互換八乘六除七十五除九乘六除加五互換遇七數者無折變仍從互換二乘八除兩折半三乘八除三因加二五四乘八除折半五乘八除减六六乘八除七十五乘之七乘八除七因加二五八乘八除不乘除九乘八除九因加二五互換遇九者無折變從本法
