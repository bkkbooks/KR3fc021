body:
  text: 丁巨筭法今有鷄三隻價直二兩鴨七隻亦直二兩今持錢一百兩欲買二色各停問鷄鴨各價多少答曰各買一百五隻鷄價七十兩鴨價三十兩以鈔一百兩以二十一乗之得二千一百為實以二十為法除之得一百零五隻乃鷄鴨數也求價者倍鷄數三除之倍鴨數七除之也今有塩四千三百五十引欲今大小船適等載之只云大船三隻載五百引小船四隻載三百引問船及塩各載多少答各一十八隻大船載三千引小船載一千三百五十引列塩四千三百五十引以十二乗之得五萬二千二百爲實以十五除之得二千九百爲法除實得大小船一十八隻也求載塩者五因大船數三除之三因小船數四除之今有官支鈔一十兩八錢買絲二十四斤若有鈔三十五錠三十七兩四錢問買絲幾斤答曰三千九百七十二斤以若有與買絲相乗為實以今有爲法除之凡異乗同除法者准此若以元鈔除絲數得每斤之數以乗若有亦通也
