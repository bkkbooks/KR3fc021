body:
  text: 今有鈔二十四兩七錢七分二釐五毫買麵三百六十七斤若有鈔二十三錠三十六兩一錢四分三釐七毫五絲問買麵幾何答曰一千七百五十七斤四兩以若有與買麵相乘為實以今有為法除之餘二五留為斤下兩若以元鈔除麵數為每斤之數也以乘若有鈔亦通嚴恭通原算法今有客借去木周圍三尺二寸長四丈八尺今却有周圍三尺六寸木問合還長若干答曰三丈七尺九寸二十七分之七術曰以原借木周圍自乘又以長乘得四十九萬一千五百二十寸十二除得四萬九百六十寸為實却以今有木周圍自乘一千二百九十六寸十二除得一百八寸為法除之即得今有柂材木闊三尺二寸厚一尺四寸長二丈三尺價錢二十五兩别有木闊二尺八寸厚一尺二寸長二丈一尺問該價若干答曰一十七兩一錢四十六分之九術曰以先有木厚闊相乘又以長乘得一十萬三千四十寸為法却以别有木厚闊相乘又以長乘得七萬五百六十寸再以原價二十五兩
