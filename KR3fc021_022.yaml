body:
  text: 乘之得一百七十六萬四千兩為實以法除之即得今有齊僧不知其數初日每五人支襯八兩次日每九人支襯七兩凡三日共支襯錢三百二十一兩問計若干答曰一百三十五人術曰互乘之以九人乘八兩得七十二以五人乘七兩得三十五併之得一百七為法别以九人五人相乘得四十五乘共支襯錢得一萬四千四百四十五以法除之即得今有錢一萬二千四百八十兩欲買黃白蠟各半其黃蠟每三斤該價一兩一錢白蠟每斤三兩一錢問買黃白蠟各若干答曰黃白蠟各三千六百斤術曰列白蠟斤價三兩一錢以三斤乘之得九兩三錢併黃蠟三斤價一兩一錢共得一十兩四錢為法置錢一萬二千四百八十兩以三斤乘之為實以法除之即得今有布匹價二十一兩絹匹價四十一兩欲將布易絹問多少可以價停答曰布四十一匹易絹二十一匹術曰布絹匹價相乘得各該價錢得八百六十一兩為實以布匹價為
