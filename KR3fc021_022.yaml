body:
  text: 乗之得一百七十六萬四千兩爲實以法除之即得今有齋僧不知其數初日每五人支襯八兩次日每九人支襯七兩凡三日共支襯錢三百二十一兩問計若干答曰一百三十五人術曰互乗之以九人乗八兩得七十二以五人乗七兩得三十五併之得一百七爲法别以九人五人相乗得四十五乗共支襯錢得一萬四千四百四十五以法除之即得今有錢一萬二千四百八十兩欲買黄白蠟各半其黄蠟每三斤該價一兩一錢白蠟每斤三兩一錢問買黄白蠟各若干答曰黄白蠟各三千六百斤術曰列白蠟斤價三兩一錢以三斤乗之得九兩三錢併黄蠟三斤價一兩一錢共得一十兩四錢爲法置錢一萬二千四百八十兩以三斤乗之爲實以法除之即得今有布疋價二十一兩絹疋價四十一兩欲將布易絹問多少可以價停答曰布四十一疋易絹二十一疋術曰布絹疋價相乗得各該價錢得八百六十一兩爲實以布疋價為
