body:
  text: 法除之得布數絹疋價爲法除之得易絹數合前問秦九韶數學九章筭回運費問有江西水運米一十二萬三千四百石原係鎮江交卸計水程二千一百三十里每石水脚錢一貫二百文今截上件米就池州安頓池州至鎮江八百八十里欲收回不該水脚錢幾何答曰收回錢六萬一千一百七十八貫五百九十一文術曰以粟米互易求之置池州至鎮江里數乗水脚錢得數又乗運米爲為實以原至鎮江水程爲法除實得收回錢草曰置池州至鎮江八百八十里乗每石水脚錢一貫二百得一千五十六貫文又乗運米一十二萬三千四百石得一億三千三十一萬四百貫文為實以原至鎮江水程二千一百三十里為法除實得六萬一千一百七十八貫五百九十一文為收回錢詳明筭法元有米五石八斗四升糶銀四兩三錢八分今只有米一石七斗二升問該銀幾何答曰一兩二錢九分法曰置銀數以只有米一石七斗二升乗之得七十五兩三錢一分六釐𨚫以元米五石八斗四升爲法歸除之
