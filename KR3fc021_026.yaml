body:
  text: 丁巨算法今有米七斗直鈔三兩二錢四分八釐若有米五石六斗八升問直鈔若干答二十六兩三錢五分五釐二毫今有鈔三兩二錢四分八釐糴米七斗若有鈔二十六兩三錢五分五釐二毫問得米多少答五石六斗八升詳明算法元有銀一兩二錢九分糴米一石七斗二升今只有銀四兩三錢八分問糴米幾何答曰五石八斗四升法曰置米數以只有銀四兩三錢八分乘之得七十五石三斗三升六合𨚫以元銀一兩二錢九分為法定身除之今有糧四十三船該三萬七千四百一十石除際留糧一十四船支二十九船贍軍問各該米幾何答曰際留糧一萬二千一百八十石贍軍糧二萬五千二百三十石法曰置糧三萬七千四百一十石以贍軍二十九船乘之得一百八萬四千八百九十石𨚫以四十三船分之得贍軍糧數别置總糧數於內
