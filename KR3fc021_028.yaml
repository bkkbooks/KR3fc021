body:
  text: 除訖贍軍糧即得際留糧數今有絹四十四萬七百九十一匹計用車五百三十三兩裝載今只裝了三百四十八車外有一百八十五車聽候載問各該絹幾何答曰見裝絹二十八萬七千七百九十六匹聽候絹一十五萬二千九百九十五匹法曰置絹數以車五百三十三兩分之得八百二十七匹却以裝了三百四十八車乘之得見裝絹數於總絹內减訖見裝絹即得聽候絹數今有李客出銀一十二兩三錢六分張客出銀一十九兩六錢四分共三十二兩營運折了七兩今只有二十五兩問各人合分銀幾何答曰張客一十五兩三錢四分三釐七毫五絲李客九兩六錢五分六釐二毫五絲法曰置張客銀一十九兩六錢四分以只有二十五兩乘之得四百九十一兩𨚫以共銀三十二兩為法歸除之得張客合分銀數於總銀內减了張客合分銀又减折了七兩餘為李客合分銀數今有羅三千三百匹每匹四十二尺出關稅之每十匹合稅羅一尺已稅了八匹𨚫貼得鈔一兩九錢今將鈔一十三兩三錢買之問該羅幾何
