body:
  text: 答曰四十二尺法曰置羅三千三百匹以一尺乘之得三百三十尺以十匹除之得三十三匹别置八匹以每匹四十二尺通之得三百三十六尺於內减了合稅羅數三百三十尺只有六尺以此六尺乘今將鈔一十三兩三錢得七百九十八尺却以貼得鈔一兩九錢為法除之得今買羅尺數丁巨算法今有布九千三百八十四匹出關稅之每三十尺稅布一尺今共稅訖三百一十三匹𨚫貼與客人鈔一兩七錢問每匹價多少答曰八兩五錢匹法二丈八尺下布以二丈八尺乘之得二十六萬二千七百五十二尺為實以三十尺為法除之得八千七百五十八尺四寸為合稅之布也寄左又下稅布三百一十三匹以二丈八尺乘之得八千七百六十四尺以合稅布直减之餘多客人布五尺六寸𨚫貼與鈔一兩七錢又下布一匹二丈八尺以一兩七錢加之為實以五尺六寸為法除之得一匹之錢詳明算法元有銀一千七百二十八兩出關稅之九而取一已稅了銀二百兩𨚫貼得鈔一百兩今將銀五十八兩賣之問該鈔幾何答曰七百二十五兩
