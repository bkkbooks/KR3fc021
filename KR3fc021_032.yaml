body:
  text: 法曰置今將銀五十八兩以元貼鈔一百兩乗之得五千八百兩别置元有銀一千七百二十八兩以稅法九歸之得一百九十二兩於已納稅銀二百兩内减了一百九十二兩只餘八兩以八兩爲法除五千八百兩得所賣銀價透簾細草今有客持銀一千七百二十八兩出關稅之九而取一今稅了銀二百兩除貼與客錢一十貫文今將錢七十二貫五百文問買銀多少答曰五十八兩法曰置都銀在地以九約之得一百九十二兩即爲合稅之銀以反减稅了銀二百兩外有八兩以乗今將錢數得五百八十貫爲實以一十貫爲法而一得五十八兩合問草曰銀八兩除貼得錢一十貫得每兩價錢一貫二百五十為法除今將錢合問丁巨筭法今有羅八尺買紅花二斤染羅三丈二尺今只有羅五十六疋一丈六尺八寸今欲减買花自染問得紅羅多少答買紅花羅一十一疋八尺九寸六分紅花七十九斤三兩八錢四分染羅四十五疋七尺八寸四分二丈八尺疋法下疋以疋法二八通之入零尺得一千五百八十四尺八寸以八尺因
