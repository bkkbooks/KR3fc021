body:
  text: 法曰置今將銀五十八兩以元貼鈔一百兩乘之得五千八百兩别置元有銀一千七百二十八兩以稅法九歸之得一百九十二兩於已納稅銀二百兩內減了一百九十二兩只餘八兩以八兩為法除五千八百兩得所賣銀價透簾細草今有客持銀一千七百二十八兩出關稅之九而取一今稅了銀二百兩除貼與客錢一十貫文今將錢七十二貫五百文問買銀多少答曰五十八兩法曰置都銀在地以九約之得一百九十二兩即為合稅之銀以反減稅了銀二百兩外有八兩以乘今將錢數得五百八十貫為實以一十貫為法而一得五十八兩合問草曰銀八兩除貼得錢一十貫得每兩價錢一貫二百五十為法除今將錢合問丁巨算法今有羅八尺買紅花二斤染羅三丈二尺今只有羅五十六匹一丈六尺八寸今欲減買花自染問得紅羅多少答買紅花羅一十一匹八尺九寸六分紅花七十九斤三兩八錢四分染羅四十五匹七尺八寸四分二丈八尺匹法下匹以匹法二八通之入零尺得一千五百八十四尺八寸以八尺因
