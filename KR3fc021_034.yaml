body:
  text: 之為實又以八尺與三丈二尺相併得四十尺為法除實見買紅花羅也又下買紅花羅以二斤因之為實以八尺除之得斤下有分加六為兩見紅花也又下總尺以染羅三丈二尺乘之為實以前併四十尺為法除實得染羅嚴恭通原算法今有絹一匹買紫草三十斤染絹二丈四尺今𨚫有絹七匹欲减絹買紫草還自染絹問减絹買草染絹各若干答曰减絹四匹一丈五尺買紫草一百三十一斤四兩染絹二匹二丈五尺術曰置絹七匹以四十尺通之得二百八十尺以乘買草絹四十尺得一萬一千二百尺併本絹得六十四尺為法除之得减絹數别以二百八十尺乘草三十斤得八千四百斤仍用六十四尺為法除之得買草數又以二百八十尺乘染絹二十四尺得六千七百二十尺仍用前法除之得染絹數合前問今有絲一斤八兩換絹一匹即四十尺及將絲九兩貼錢四兩得絹二丈今有錢五兩問買絹得若干答曰六尺二寸五分
