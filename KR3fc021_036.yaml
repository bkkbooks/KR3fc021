body:
  text: 術曰列絲九兩乗換絹四十尺得三百六十尺却以絲一斤八兩准二十四兩爲法除之得一丈五尺為絲所得絹减二丈减餘五尺爲錢所直𨚫乗今有錢五兩得二十五尺爲實以貼錢四兩爲法除之即得錦囊啓源今有温州打染雜色布一十四疋共直米三十三石六斗又有雜色布二百八十六疋問直米多少答曰四百石四斗法曰下又有布二百八十六疋在地用直米乗之見九千六百九石六斗爲實用布三十四疋除之合問一等之法准此求之今有水銀二百八十四兩直銀七錠五兩只有課銀三百八錠三十一兩二錢五分該水銀多少答曰一萬二千三百四十五兩法曰下只有課銀在地錠用五通之見一萬五千四百三十一兩二錢五分用水銀乗之見四百三十八萬二千四百七十五兩爲實列銀七錠以五通之共見三百五十五兩作法除之今有小麥一十六石磨到白麵一千四百八十斤只有白麵一千一百四十一斤一十四兩六錢該小麥多少
