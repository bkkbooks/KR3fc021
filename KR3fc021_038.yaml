body:
  text: 答曰一十二石三斗四升五合法曰下只有麵在地兩已下用斤分為實用小麥十六石乘之見一十八萬二千七百六為實用磨到白麵一千四百八十斤除之合問今有川芎四十五斤共直白銀二百一十三兩七錢五分只有川芎三百八十四斤一十二兩問銀多少答曰三十六錠二十七兩五錢六分二釐半法曰下只有川芎在地兩用斤分以直銀乘之得八萬二千二百四十兩三錢一分二釐半為實以四十五斤除之錠用五約合問今有鍾乳粉二百四十六斤該牙錢米三十石三斗五升六合四勺今收訖牙錢米七千七石七斗六升二合六勺問鍾乳幾斤答曰五萬六千七百八十九斤法曰下收訖牙錢米在地用鍾乳粉乘之見一百七十二萬三千九百九石五斗九升九合六勺為實用牙錢米作法除之合問今有赤金三釐七絲二忽得常行篦子二十四付只有赤金一十萬兩問該篦子多少答曰七億八千一百二十五萬付
