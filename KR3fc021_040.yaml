body:
  text: 九章算經今有田一畝收粟六升太半升今有田一頃二十六畝一百五十九步問收粟幾何答曰八斛四斗四升一十二分升之五術曰以畝二百四十步為法以六升太半升乘今有田積步為實實如法得粟數按此術亦今有之義以一畝步數為所有率六升太半升為所來率今有田積步為所有數而今有之即得錦囊啓源今有秋糧地二十三頃四十五畝共該正耗二百五十石九斗一升五合照依地畝又科下秋糧五百二十三石七斗六升半問該地若干答曰四十八頃九十五畝今有上號三梭布三百六十五匹共得淨花四千五百六十二斤八兩匹法二丈四尺只有淨花五千三百五十八馱四十四斤一兩每馱一百二十斤該三梭多少答曰五萬一千四百四十匹七尺八寸法曰下只有花在地兩用斤分馱法加二共見六十四萬三千四斤六釐二毫半用三梭布乘之得二億三千四百六十九萬六千四百八十二斤八分一釐二毫半為實用原淨花作法除之見五萬一千四百四
