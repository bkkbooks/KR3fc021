body:
  text: 十匹三分二釐半零數用匹法二丈四尺乘之得七尺八寸合此法是異乘同除帶馱法斤稱并端匹也今本郡庫內收訖净花一十萬三千四十五馱一鈞一稱一十一斤一十三兩只云每花地七畝帶加耗納著二斤一兩問該地幾頃答曰四十一萬九千六百七十六頃一十一畝法曰置收到净花在地馱數內加二見一千二百三十六萬五千四百斤加入鈞稱斤兩兩用斤分共見一千二百三十六萬五千四百五十六斤八分一釐二毫半以畝數乘之為實用納花二斤一兩兩用斤分作法除之得所求頃畝也合問但遇相應之法准此求也詳明等法元雇車一兩議行道一千里載重一千二百斤與鈔七十五兩今添重三百六十斤行一千三百里問與鈔幾何答曰一百二十六兩七錢五分法曰置元載重一千二百斤以元行道一千里乘之得一百二十萬斤為法别置元載重一千二百斤搭上今添重三百六十斤共一千五百六十斤以元價七十五兩乘之得一十一萬七千又以今行道一千三百里乘之得一萬五千二百一十𨚫以一百二十萬斤為法除之得今
