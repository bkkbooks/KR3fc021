body:
  text: 百乘之得八十一億二千一百六十萬為實今載重一千六百九十二乘元與錢七千五百得一千二百六十九萬為法除之合問丁巨算法以元行道乘元載重與今與鈔相乘為實𨚫以元與鈔乘今載重為法除之一元雇車一兩議行道一千里載重一千二百斤與鈔七十五兩今與鈔七十六兩五錢行一千七百里問載重幾何答曰七百二十斤法曰置元載重以元行道乘之得一百二十萬又以今與鈔七十六兩五錢乘之侍九千一百八十萬别置今行道以元與鈔乘之得一十二萬七千五百為法以此除九千一百八十萬即得合載斤數透簾細草草曰元載重乘元行道得一百二十萬以今與錢七千六百五十乘之得九十一億八千萬為實今行道一千七百乘元與錢七千五百得一千二百七十五萬為法除之合問丁巨算法以元載重乘元行道與今與鈔相乘為實𨚫以今行道乘元與鈔為法除之一今有雇車一兩行道一千里載重一千二百斤與錢七貫五百
