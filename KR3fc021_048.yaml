body:
  text: 文今减重四百八十斤行道一千七百里問合與錢多少答曰七貫六百五十文法曰置元與錢以今行道乘之又以今載重乘之為實以元載重乘元行道為法而一合前問草曰元與錢七千五百乘今行道一千七百得一千二百七十五萬又以今載重七百二十斤乘之得九十一億八千萬為實以元載重乘元行道得一百二十萬為法除實合問丁巨算法雇車一兩行九百里載二千五百斤與錢一百八十兩今又載三千六百五十斤行一千六百里問與幾錢答曰四百六十七兩二錢雇車一兩行九百里載二千五百斤與錢一百八十兩今又載三千六百五十斤與錢四百六十七兩二錢問行幾里答一千六百里雇車一兩行九百里載二千五百斤與錢一百八十兩今行一千六百里與錢四百六十七兩二錢問載重幾何
