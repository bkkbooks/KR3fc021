body:
  text: 答三千六百五十斤嚴恭通原算法今有人擔茶九十斤行五百步得錢一兩今擔茶一百二十斤行三百五十步問得錢若干答曰九錢三分三釐三分之一術曰以今擔茶一百二十斤乘三百五十步又以得錢一兩乘之為實别以先擔茶九十斤乘五百步為法除之即得丁巨算法有六人八日淘金七錢四分今二十四人淘一月問得多少答一十一兩一錢透簾細草今有七人八日淘金一十七銖今有二十七人一月淘金合得多少答曰七兩二十三銖二絫五黍法曰置元淘金一十七銖以今二十一人乘之又以三十日乘之得一萬七百一十銖為實以元七人乘八日得五十六為法除實得一百九十一銖二絫五黍以二十四約之為兩得七兩二十三銖二絫五黍合
  hash: sha256:8041c81cfff0dc547ab4e218487ac55e762dab37017379f148deacc7625ad43a
