body:
  text: 問草曰是五十六人一日得金一十七銖用人數除金得一人一日得金三絫二十八分絫之一𨚫通分内子得八十五銖又三十日乗二十一人得六百三十頭位相乗得五萬三千五百五十𨚫用分母二十八除之得合問今有九人九日淘金一十八銖今三十人共淘金一斤問合用幾日答曰五十七日五分日之三法曰置今淘金三百八十四銖以九人乗之又以九日乗之得三萬一千一百四銖爲實以元淘金一十八銖乗今三十人得五百四十爲法以除其實得五十七日餘與法各以一百八約之得五分日之三合問今有九人九日得金一十八銖今淘得金來五十七日五分日之三得一斤問用人多少答曰三十人法曰置今淘金三百八十四銖以元用九人乗之又以九日乗之以分毋五因之得一十五萬五千五百二十爲實又置五十七日以分母五因内子三得二百八十八以元淘金一十八銖乗之得五千一百八十四為法除實得三十人合問
