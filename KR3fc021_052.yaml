body:
  text: 問草曰是五十六人一日得金一十七銖用人數除金得一人一日得金三絫二十八分絫之一𨚫通分內子得八十五銖又三十日乘二十一人得六百三十頭位相乘得五萬三千五百五十𨚫用分母二十八除之得合問今有九人九日淘金一十八銖今三十人共淘金一斤問合用幾日答曰五十七日五分日之三法曰置今淘金三百八十四銖以九人乘之又以九日乘之得三萬一千一百四銖為實以元淘金一十八銖乘今三十人得五百四十為法以除其實得五十七日餘與法各以一百八約之得五分日之三合問今有九人九日得金一十八銖今淘得金來五十七日五分日之三得一斤問用人多少答曰三十人法曰置今淘金三百八十四銖以元用九人乘之又以九日乘之以分毋五因之得一十五萬五千五百二十為實又置五十七日以分母五因內子三得二百八十八以元淘金一十八銖乘之得五千一百八十四為法除實得三十人合問
