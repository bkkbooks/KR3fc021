body:
  text: 秦九韶數學九章軍器功程問今欲造弓刀各一萬副箭一百萬隻據工程七人九日造弓八張八人六日造刀五副三人二日造箭一百五十隻作院見管弓作二百人刀作五百四十人箭作二百七十六人欲知畢日幾何答曰造弓一萬張三百九十三日四分日之三造刀一萬副一百七十七日九分日之七造箭一百萬隻一百四十四日二百七分日之一百八十二術曰以粟米求之互換入之置各功程原人率于右行置原日數于中行置欲求數為左行以三行對乘之為各實列右行次置原物數于中行置見管人為左行以左行乘中行各為法以對除右行各得日數草曰置原造弓七人造刀八人造箭三人於右行次置造弓九日造刀六日造箭二日列中行又置欲造弓一萬欲造刀一萬欲造箭一百萬列左行以三行對乘
