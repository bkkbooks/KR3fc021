body:
  text: 丁巨算法今有弓匠四人造弓五日得三張今二十四日造弓五十四張問幾人造弓答一十五人透簾細草今有拏手六十九人每五人四日破鏨三箇今教閲來一月問用鏨多少答曰三百一十箇半法曰以三十日乘六十九人又以三箇乘之得六千二百一十為實以五人乘四日得二十為法實如法而一合問草曰是一人一日破鏨一分半也又六十九人乘三十日得二萬七百以一分半乘之合問丁巨算法有八成金重三兩五錢倒鈔一百二十兩又有九成金倒鈔一百六十二兩問得金幾兩答四兩二錢凡兩頭交易先布六草為法已負者甲乙乘為法丙丁戊乘為實丁怯者丙戊乘為法甲乙已乘為實戊闕者丙丁乘為法甲乙已乘為實甲乙丙丁戊己若以復乘之除之亦通
  hash: sha256:1842d0bd1e2c7ba2a9c6e8205321fd5064346bf676de4c672e31b664045525cc
