body:
  text: 相叅意巧故立此問草曰以所求貸七百五十乗九日得六千七百五十乗所有爲實月息三十得二十萬二千五百以所有率為法貸錢一貫乗月息三十得三萬實如法而一除得六錢餘二萬二千五百與法約之為四分之三比類均輸第六中顧夫負塩負籠二題同意孫子筭經今有貸與人絲五十七斤限歲出息一十六斤問斤息幾何答曰四兩五十七分兩之二十八術曰列限息絲一十六斤以十六兩乗之得二百五十六兩以貸絲五十七斤除之不盡約之即得秦九韶數學九章推求典本問典庫今年二月二十九日有人取觧一號主家聽得當事共筭本息一百六十貫八百三十二文稱係前歲頭臘月半解去月息二分二釐欲知原本幾何答曰本一百二十貫文術曰以粟米求之置積日乗息分數增三百為法以三百乗共錢為實實如法而一得本草曰置前年頭臘月半係四十五日併去年三百六十又加今年五十九日共得四百六十四為積日乗息二分二釐得一百二文八釐增三百文得四百二文八釐為法以三百文乗共錢一
  hash: sha256:a9bd2596d866ec76ce1b4d3306b21629d4bc510aae1c8ff8087a405233b2b3c1
