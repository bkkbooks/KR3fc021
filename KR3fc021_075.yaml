body:
  text: 八陌乗總錢此要者乗以九十八陌乗一十八貫七百得十八貫三百二十六文足以官省七十七除之十上定百得所答數又草曰指南用加四减一以代乗除一貫一百文九十八陌可展七十七陌錢一貫四百故用加四减一之法置緫錢一十八貫七百文加四得二十六貫一百八十文减一所得答問透簾細草今有省錢二百三十一貫文問得七十五陌錢多少答曰二百三十七貫一百六十文法曰置省錢以七十七乗之見足錢𨚫以七十五除之合前問丁巨筭法今有人典鈔不記本錢每月息三分今二十四箇月二十一日通該本息鈔五十四錠三十三兩三錢七分問本息各幾何答曰本鈔三十一錠二十兩息鈔二十三錠一十三兩三錢七分以本息共鈔為實以二十四箇月二十一日三除日數為月下之分以月息三分乗之得七錢四分一釐即每兩之息也加入本鈔一兩得一兩七錢四分一釐為法除實先將本鈔反减得息鈔嚴恭通原筭法假如甲年十二月二十八日典錢五十兩月息三分於丙年六月初八日取贖問利息若干
