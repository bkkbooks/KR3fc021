body:
  text: 答曰二十六兩術曰先下六月初八日加上二十四月除去十二月二十八日餘剩一十七月零一十日以三十日通月計五百二十日𨚫以典錢五十兩以月息乘之得一兩五錢乘之以三十日為法除之即得今有人借他布三匹匹四十尺約每月匹息三尺今已七箇月取去布二匹貼還錢三兩問布匹價若干答曰七兩五分八釐八毫一十七分毫之四術曰列借布三匹以匹息三尺乘之得月息九尺又乘七月得六十三尺以取去布二匹準八十又減餘一十七尺為法以貼還錢三兩𨚫以四十尺乘之得一百二十兩為實以法除之即得和合差分詳明算法歌曰差分和合法尤精髙價先乘共物情𨚫用都錢減今數餘留為實甚分明别將二價也相減用此餘錢為法行除了先為低物價自餘髙價物方成楊輝日用算法菽每石七百八十五文麥每石一貫一百六十文今用錢二百九十七貫糴到菽麥共三百石問本各幾何答曰菽一百三十六石麥一百六十四石
