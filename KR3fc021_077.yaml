body:
  text: 答曰二十六兩術曰先下六月初八日加上二十四月除去十二月二十八日餘剩一十七月零一十日以三十日通月計五百二十日𨚫以典錢五十兩以月息乗之得一兩五錢乗之以三十日爲法除之即得今有人借他布三疋疋四十尺約每月疋息三尺今已七箇月取去布二疋貼還錢三兩問布疋價若干答曰七兩五分八釐八毫一十七分毫之四術曰列借布三疋以疋息三尺乗之得月息九尺又乗七月得六十三尺以取去布二疋准八十又减餘一十七尺爲法以貼還錢三兩𨚫以四十尺乗之得一百二十兩為實以法除之即得和合差分詳明筭法歌曰差分和合法尤精髙價先乗共物情𨚫用都錢减今數餘留為實甚分明别將二價也相减用此餘錢為法行除了先爲低物價自餘髙價物方成楊輝日用筭法菽每石七百八十五文麥每石一貫一百六十文今用錢二百九十七貫糴到菽麥共三百石問本各幾何答曰菽一百三十六石麥一百六十四石
