body:
  text: 解題菽麥為問分身為法分率術曰共物為實以賤率乘之俱為賤價以減總錢餘為貴實貴物所多之數貴賤二率相減餘為法求見一價所多之差除之先見貴物以貴物減總數餘為賤也草曰共物為實菽麥共三百石以賤率乘之菽賤每石七百八十五文乘得二百三十五貫五百文以減總錢二百九十七貫餘為貴實六十一貫五百貴賤二率相減餘為法菽石價七百八十五麥石價一貫一百六十相減餘三百七十五為法除之以法除六十一貫五百文先得貴物麥一百六十四石以貴物麥也減總數菽麥總數餘為賤實菽得
