body:
  text: 一百三十六石合問楊輝詳解錢二十貫買四百六十尺綾每尺四十三羅每尺四十四問綾羅價幾何答曰二百四十尺尺四十三二百二十尺尺四十四解題反用前問二價相和俗曰粟麥分身草曰以貴價乘都數貴價每尺四十四乘四百六十得十貫二百四十內多二百四十以原錢减餘為實原錢二十貫减之餘二百四十貴賤二價相减餘為法四十三减四十四餘一以法除實得二百四十即賤物數以减都數求貴物之數嚴恭通原算法今有係官民田共納正米四百七十一石四斗八升六合共納過耗米二十六石五斗三合一抄五撮問係官民苗正耗米各若干答曰係官正米一百八十五石七斗四升三合耗米六石五斗一合五撮民苗正米二百八十五石七斗四升三合耗米二十石二合一抄術曰置正米總數以七升乘之得三十三石四合二抄减去納過耗米二十六石五斗三合一抄五撮餘得六石五斗一合五撮為實却以民
