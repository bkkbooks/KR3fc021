body:
  text: 苗耗米七升減去係官耗米三升五合餘三升五合為法除之得一百八十五石七斗四升三合為官正米别置共該正米以三升五合乘之得一十六石五斗二合一抄却以納過耗米三十六石五斗三合一抄五撮減餘得一十石一合五撮為實仍以三升五合為法除之得是民苗正米依前法各乘耗米合前問此貴賤相和一體透簾細草今有官庫帳管省錢與七十二陌錢共二百七十三貫七百五十文為年深索子爛斷共穿排得足陌錢二百六貫四百七十文問元本二色錢各多少答曰省錢一百八十七貫四百文七十二陌錢八十六貫三百五十文法曰置共管錢數以七十七乘之一百約之得二百一十貫七百八十七文五分內減了共排得錢餘有四貫三百一十七文五分為實又以七十二減七十七餘五文為法除之為百得八十六貫三百五十文為七十二陌錢以反減元管錢數其餘即省錢合問透簾細草今有麻麥共三十八石七斗二升總糶鈔五十九兩二錢四分九釐七毫麻每斗價鈔一錢八分五釐麥每斗價一錢三分六釐問麻麥
