body:
  text: 苗耗米七升减去係官耗米三升五合餘三升五合爲法除之得一百八十五石七斗四升三合爲官正米别置共該正米以三升五合乗之得一十六石五斗二合一抄却以納過耗米三十六石五斗三合一抄五撮减餘得一十石一合五撮爲實仍以三升五合爲法除之得是民苗正米依前法各乗耗米合前問此貴賤相和一體透簾細草今有官庫帳管省錢與七十二陌錢共二百七十三貫七百五十文為年深索子爛斷共穿排得足陌錢二百六貫四百七十文問元本二色錢各多少答曰省錢一百八十七貫四百文七十二陌錢八十六貫三百五十文法曰置共管錢數以七十七乗之一百約之得二百一十貫七百八十七文五分内减了共排得錢餘有四貫三百一十七文五分為實又以七十二减七十七餘五文爲法除之爲百得八十六貫三百五十文爲七十二陌錢以反减元管錢數其餘即省錢合問透簾細草今有麻麥共三十八石七斗二升緫糶鈔五十九兩二錢四分九釐七毫麻每斗價鈔一錢八分五釐麥每斗價一錢三分六釐問麻麥
