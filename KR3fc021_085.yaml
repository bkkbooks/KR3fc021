body:
  text: 之各數并該鈔幾何答曰麥二十五石二斗七升該鈔三十四兩三錢六分七釐二毫麻一十三石四斗五升該鈔二十四兩八錢八分二釐五毫法曰置麻麥共數以麻斗價乘之得七十一兩六錢三分二釐於數內減訖總糶鈔餘一十二兩三錢八分二釐三毫别置麻斗價於內減訖麥斗價餘四分九釐為法以法除餘鈔一十二兩三錢八分二釐三毫得麥數於共數內減訖麥數餘為麻數却以麥斗價乘麥數得麥總價麻總價仿此嚴恭通原算法今有米麥共一千石共該價一萬六千八百一十四兩七錢一分只云米石價一十七兩二錢麥石價一十四兩五錢問米麥各若干答曰米八百五十七石三斗麥一百四十二石七斗術曰置米麥共數以米價乘之得一萬七千二百兩減去共價餘有三百八十五兩二錢九分為實米麥價相減餘二兩七錢為法除之得麥數别置米麥共數以麥價乘之得一萬四千五百兩𨚫以共價減餘二千三百一十四兩七錢一分仍以二兩七錢為法除之得米
