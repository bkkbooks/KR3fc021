body:
  text: 數合前問透簾細草今有錢五百一十四貫七十六文糴到粟麥共八百一十一石三斗麥每斗七十二文粟每斗五十六文問粟麥各多少答曰麥三百七十三石四斗二升五合粟四百三十七石八斗七升五合法曰下粟麥共數在地以麥斗價七十二文乘之得五百八十四貫一百三十六文內減了粟錢數餘有七十貫六十文為實以粟麥斗價以少減多餘有一十六文為法除實得四百三十七石八斗七升五合為粟數反減共數餘者為麥數也乃合前問丁巨算法今有芝麻豆共六十三石六斗共糶鈔四百五十八兩錢八五分芝麻每斗九錢黑豆每斗六錢問二色各幾何答芝麻二十五石七斗五升鈔二百三十一兩七錢五分黑豆三十七石八斗五升鈔二百二十七兩一錢以共數與芝麻價相乘得五百七十二兩四錢與共鈔相減餘一百一十三兩五錢五分為實𨚫以二價相減餘三為法除之得三十七石八斗五升為黑豆數反減共數得芝麻數
