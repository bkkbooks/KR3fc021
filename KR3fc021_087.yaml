body:
  text: 數合前問透簾細草今有錢五百一十四貫七十六文糴到粟麥共八百一十一石三斗麥每斗七十二文粟每斗五十六文問粟麥各多少答曰麥三百七十三石四斗二升五合粟四百三十七石八斗七升五合法曰下粟麥共數在地以麥斗價七十二文乗之得五百八十四貫一百三十六文内减了粟錢數餘有七十貫六十文為實以粟麥斗價以少减多餘有一十六文爲法除實得四百三十七石八斗七升五合爲粟數反减共數餘者為麥數也乃合前問丁巨筭法今有芝麻豆共六十三石六斗共糶鈔四百五十八兩錢八五分芝麻每斗九錢黑豆每斗六錢問二色各幾何答芝麻二十五石七斗五升鈔二百三十一兩七錢五分黑豆三十七石八斗五升鈔二百二十七兩一錢以共數與芝麻價相乗得五百七十二兩四錢與共鈔相减餘一百一十三兩五錢五分爲實𨚫以二價相减餘三爲法除之得三十七石八斗五升爲黑豆數反减共數得芝麻數
