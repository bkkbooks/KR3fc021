body:
  text: 詳明筭法今有銀五十七兩九錢每銀一錢買桃子一百六十四箇每銀一錢買李子一百二十八箇共買得桃李八萬三千二百二十箇問各用銀及桃李各幾何答曰銀三十二兩六錢買李四萬一千七百二十八箇銀二十五兩三錢買桃四萬一千四百九十二箇法曰置銀緫數以桃一百六十四箇乗之得九萬四千九百五十六箇於内减訖桃李共數餘一萬一千七百三十六箇别置桃一百六十四箇於内减訖李一百二十八箇餘三十六箇爲法𨚫以法除共數一萬一千七百三十六箇得三十二兩六錢是買李之銀於共銀内减訖買李銀餘二十五兩三錢是買桃之銀𨚫以一錢買到李箇數乗買李之銀得李緫價桃價倣此丁巨筭法今有鈔二兩六錢三分買核桃雪梨共五百五十五箇核桃一錢買一十二箇雪梨一錢買三十箇問桃李各幾箇答桃一百五十六箇鈔一兩三錢梨三百九十九箇鈔一兩三錢三分以緫鈔與核桃箇數相乗得三百一十五箇六分與核桃梨共數相减
  hash: sha256:7a37ea4fd6f4dadedd1325c8ed1bd4f2ae1289294f51f957ea65dc328630e5e6
