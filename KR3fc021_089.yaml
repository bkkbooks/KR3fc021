body:
  text: 詳明算法今有銀五十七兩九錢每銀一錢買桃子一百六十四箇每銀一錢買李子一百二十八箇共買得桃李八萬三千二百二十箇問各用銀及桃李各幾何答曰銀三十二兩六錢買李四萬一千七百二十八箇銀二十五兩三錢買桃四萬一千四百九十二箇法曰置銀總數以桃一百六十四箇乘之得九萬四千九百五十六箇於內減訖桃李共數餘一萬一千七百三十六箇别置桃一百六十四箇於內減訖李一百二十八箇餘三十六箇為法𨚫以法除共數一萬一千七百三十六箇得三十二兩六錢是買李之銀於共銀內減訖買李銀餘二十五兩三錢是買桃之銀𨚫以一錢買到李箇數乘買李之銀得李總價桃價倣此丁巨算法今有鈔二兩六錢三分買核桃雪梨共五百五十五箇核桃一錢買一十二箇雪梨一錢買三十箇問桃李各幾箇答桃一百五十六箇鈔一兩三錢梨三百九十九箇鈔一兩三錢三分以總鈔與核桃箇數相乘得三百一十五箇六分與核桃梨共數相減
