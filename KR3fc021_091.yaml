body:
  text: 餘二百三十九箇四分為實以三除之折半得梨數反減得桃數此一法僅存旁通不可為例要之前法通例也今有甲乙藥二件該六百九十五斤一十三兩共賣鈔二千一百六十三兩六錢九分六毫二絲五忽甲藥每斤三兩四錢五分乙藥每斤二兩七錢五分問二藥價各幾何答甲藥三百五十七斤七兩鈔一千二百三十三兩一錢五分九釐三毫七絲五忽乙藥三百三十八斤六兩鈔九百三十兩五錢三分一釐二毫五絲置共六百九十五斤八一二五先以甲價乘之得二千四百兩五錢五分三釐一毫二絲五忽內減去共賣鈔二千一百六十三兩六錢九分六毫二絲五忽得二百三十六兩八錢六分二釐五毫為實以價相減餘七分為法除之得三百三十八斤三分七釐五毫加六零分得六兩為乙藥斤數反減共數餘為甲藥斤數以各價乘之今有錢五萬三百四十六兩八錢買茶一千引只云末茶每引六十三兩八錢葉茶每引四十六兩五錢問二色各幾引答葉茶七百六十四引末茶二百三十六引
