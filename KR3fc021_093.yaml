body:
  text: 今有蜜蠟一百四十六斤六兩共直鈔二十九貫六百八十七文五分只云蠟斤價三百八十文蜜斤價六十八文問各多少答蜜八十三斤二兩蠟六十三斤四兩其帶兩者留之以麻麥法求之通矣凡貴賤相和即盈朒之類也不可以例通惟通分於分術當自知之嚴恭通原筭法今有大魚一斤直錢二兩小魚七斤直錢五兩今買魚一百斤價錢八十七兩五錢問大小魚各若干答曰大魚一十二斤半小魚八十七斤半術曰置魚一百斤以二兩乗之得二百兩减去八十七兩五錢餘有一百一十二兩五錢以七斤乗之得七百八十七兩五錢爲實𨚫以小魚七斤以二兩乗之得一十四兩减去五兩餘九兩為法除之得小魚數别置魚一百斤以五兩乗之得五百兩又置錢八十七兩五錢以七斤乗之得六百一十二兩五錢减去五百兩餘一百一十二兩五錢仍以九兩為法除之得大魚數合前問孫子筭經今有獸六首四足禽四首二足上有七十六首下有四十六足問禽獸各幾何
