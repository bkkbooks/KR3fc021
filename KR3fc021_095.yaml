body:
  text: 答曰八獸七禽術曰倍足以减首餘半之即獸以四乗獸减足餘半之即禽今有雉兎同籠上有三十五頭下有九十四足問雉兎各幾何答曰雉二十三兔一十二術曰上置三十五頭下置九十四足半其足得四十七以少减多𠕂命之上三除下三上五除下五下有一除上一下有二除上二即得又術曰上置頭下置足半其足以頭除足以足除頭即得雉兎同籠上有三十五頭即是三十五隻下共九十四足問各幾何分身術曰倍頭减足倍四不分雉兎是以二足乗隻數於衆足内减所餘者即一兔剩二足也折半爲兎先求雉術曰四因隻數兎有四足以共足九十四足减之餘皆雉足四十六折半爲雉嚴恭通原筭法今有雉兎同籠上有二十五頭下有六十四足問鷄兎各若干答曰鷄一十八箇兎七箇術曰上置頭下置足半其足以足减頭以頭减足丁巨筭法今有鷄兎一百共足二百七十二隻只云鷄足二兎足四問二
