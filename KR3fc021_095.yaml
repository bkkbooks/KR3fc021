body:
  text: 答曰八獸七禽術曰倍足以減首餘半之即獸以四乘獸減足餘半之即禽今有雉兔同籠上有三十五頭下有九十四足問雉兔各幾何答曰雉二十三兔一十二術曰上置三十五頭下置九十四足半其足得四十七以少減多再命之上三除下三上五除下五下有一除上一下有二除上二即得又術曰上置頭下置足半其足以頭除足以足除頭即得雉兔同籠上有三十五頭即是三十五隻下共九十四足問各幾何分身術曰倍頭減足倍四不分雉兔是以二足乘隻數於衆足內減所餘者即一兔剩二足也折半為兔先求雉術曰四因隻數兔有四足以共足九十四足減之餘皆雉足四十六折半為雉嚴恭通原算法今有雉兔同籠上有二十五頭下有六十四足問雞兔各若干答曰雞一十八箇兔七箇術曰上置頭下置足半其足以足減頭以頭減足丁巨算法今有雞兔一百共足二百七十二隻只云雞足二兔足四問二
