body:
  text: 色各幾何答曰雞六十四隻兔三十六隻置共一百以四乘之得四百與總足相減餘一百二十八折半得雞數反減得兔倍一百得二百減總足餘七十二折半得兔反減得雞亦通三率分身楊輝摘竒算法醇酒每斗七貫行酒每斗三貫醨酒三斗直一貫今攴一十貫買酒十斗問各幾何答曰醇酒六升價四貫二伯文行酒一斗價三貫文醨酒八斗四升價二貫八百文本無三分身之術張丘建篡經辨古通源秪有細草輝偶見寫本有此題問亦無成術冝云三價中以一價除出一位所得之數其餘二物共價如雙分身法求之題有分子者通之草曰置十貫酒十斗先以行酒一斗三貫除出一斗餘錢七貫即醇醨酒九斗共價也如雙分身術求之內醨酒三斗直一貫合通分以共價七貫三四作二十一醇酒一斗直七貫亦用三因醨酒三斗直一貫以醨酒一貫乘九斗減共錢餘一十二貫為實以醇醨二價相減餘二十貫為法除實得醇酒六升反減九斗共數得醨酒八斗四升以各價乘之合問
