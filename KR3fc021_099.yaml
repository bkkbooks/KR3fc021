body:
  text: 今有雞翁一直五文雞母一直三文雞雛三直一文凡一百文買雞百隻問翁母雛各幾何答曰雞翁八隻直四十文雞母十一隻直三十三文雞雛八十一隻直一十七文張丘建篡經術云雞翁每增四雞母每减七雞雛每益三謂已成數上增减也本經自云疑其從來闕文流傳既久無可考證今將細草參考於已算出數上增减正無本法原草曰置錢一百文為實又置雞翁一雞母一各以雞雛三因之雞翁得三雞母得三并雞雛三併之共得九為法除實得十一為雞母數不盡一返减下法九餘八為雞翁數别列雞都數一百隻减去雞翁八雞母十一餘八十一為雞雛數置翁母雛各價因之合問引前法草曰置所答數雞翁增四得十二隻雞母减七得四隻雞雛益三得八十四隻共百雞合問出錢一百買溫柑緑橘匾橘共一百枚只云溫柑一枚七文緑橘一枚三文匾橘三枚一文問各買幾何答曰溫柑六枚計四十二文緑橘十枚計三十文匾橘八十四枚計二十八文
