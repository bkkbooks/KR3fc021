body:
  text: 辨古通源算草曰置錢一百以三因為三百分內減共數一百枚餘二百分為實三因溫柑價得二十一內減一餘二十分又三因緑橘價得九內減一餘八分併之得二十八為法除實得六枚乃溫柑緑橘各六枚之數實餘三十二分以原法二十八減去溫柑二十分餘八除實得四加先得緑橘共十枚之數以溫柑緑橘共十六枚減都數一百餘八十四即匾橘之數嚴恭通原笲法今有錢三十五兩四錢買到桃子四百箇李子三百箇棗子二百箇只云桃子一箇價錢可比李子八箇比棗子四十箇問三色各價若干答曰桃子每箇八分計錢三十二兩李子每箇一分計錢三兩棗子每箇二釐計錢四錢術曰置李子三百箇以八除之得三十七箇半棗子二百箇以四十除之得五箇併桃子共四百四十二箇半為法置錢三十五兩四錢為實以法除之得八分為桃子每箇價又以八除得一分為李子每箇價又以四十除得二釐為棗子每箇價各以原買箇數乘之得總價合前問今有綾一百五十匹羅三百匹絹四百五十匹總該價錢二萬九千二百
