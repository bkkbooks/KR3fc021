body:
  text: 八十兩只云綾匹價比羅匹價較多四兩七錢又羅匹價比絹匹價較多一十三兩五錢問綾羅絹各價若干答曰綾匹價四十三兩二錢羅匹價三十八兩五錢絹匹價二十五兩術曰列羅三百匹以一十三兩五錢相乘得四千五十兩又綾一百五十匹以一十八兩二錢相乘得二千七百三十兩併之得六千七百八十兩以總價减餘得二萬二千五百兩為實以三項匹數併之得九百匹為法除之得絹匹價增上一十三兩五錢是羅匹價又增四兩七錢是綾匹價合前問今有錢一千八兩買到絲綿線共三百六十兩只云其中絲三綿二線一其線一兩價及綿價一兩六錢及絲價二兩問三色併價各若干答曰絲一百八十兩每兩價錢二兩二錢四分綿一百二十兩每兩價錢二兩八錢線六十兩每兩價錢四兩四錢八分術曰先列絲綿線共三百六十兩為三位頭位三乘中位二乘下位一乘副併三二一得六分為法各除之頭位是絲中位是綿下位是線以二兩除頭位得九十又一兩六錢除中位得七十五連下位併得二百
