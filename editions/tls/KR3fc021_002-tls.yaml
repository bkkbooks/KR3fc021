body:
  text: 筭筭法十四異乗同除詳明筭法歌曰異乗同除法何如物賣錢來做例兒先下原錢乗只物却將原物法徐之將錢買物互乗取百里千斤以類推筭者留心能善用一絲一忽不差池九章筭經今有絲一斤價直二百四十今有錢一千三百二十八問得絲幾何答曰五斤八兩一十二銖五分銖之四術曰以一斤價數爲法以一斤乗今有錢數爲實實如法得絲數按此術今有之義以一斤價爲所有率一斤爲所求率今有錢爲所有數而今有之即得今有絲一斤價直三百四十五今有絲七兩一十二銖問得錢幾何答曰一百六十一錢三十二分錢之二十三術曰以一斤銖數爲法以一斤價數乗七兩一十二銖爲實實如法得
