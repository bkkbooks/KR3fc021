body:
  text: 錢數按此術亦今有之義以絲一斤數爲所有率價錢爲所求率今有絲爲所有數而今有之即得今有縑一丈價直一百二十八今有縑一疋九尺五寸問得錢幾何答曰六百三十三錢五分錢之三術曰以一丈寸數爲法以價錢數乗今有縑寸數爲實實如法得錢數淳風等按此術亦今有之義以縑一丈寸數為所有率價錢爲所求率今有縑寸數爲所有數而今有之即得今有布一疋價直一百二十五今有布二丈七尺問得錢幾何答曰八十四錢八分錢之三術曰以一疋尺數爲法今有布尺數乗價錢爲實實如法得錢數按此術亦今有之義以一疋尺數爲所有率價錢為所求率今有布為所有數今有之即得今有素一疋一丈價直六百二十五今有錢五百問得素幾何答曰得素一疋術曰以價直爲法以一疋一丈尺數乗今有錢數爲實實如法得素數按此術亦今有之義以價錢爲所有率以丈尺數爲所求率今有錢為
