body:
  text: 百七十五文以五文除之即得楊輝摘竒筭法應用筭法以径乗代互換者固善其間又有不可代者冝兩存之變換活法遇一除者定位只乗不除二爲除者定位乗訖折半二乗三除置積减五三乗三除不乗除只定位四乗三除互換五乗三除六乗三除二因七乗三除八乗三除互換九乗三除定位三因米三斗四升換粟五斗二升今有米二百三十八石問計粟幾何答曰三百六十四石解題米粟為問互換為法互換術曰以所求率乗所有數為實以所有率為法實如法而一以所求率乗所有數者乃商除之法也其數有分子今法径以所求率乗所有之數是要者為乗以原有數為法是不要者為除是總乗總除免分子之繁也
