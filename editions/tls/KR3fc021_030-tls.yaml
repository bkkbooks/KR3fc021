body:
  text: 答曰四十二尺法曰置羅三千三百疋以一尺乗之得三百三十尺以十疋除之得三十三疋别置八疋以每疋四十二尺通之得三百三十六尺於内减了合稅羅數三百三十尺只有六尺以此六尺乗今將鈔一十三兩三錢得七百九十八尺却以貼得鈔一兩九錢爲法除之得今買羅尺數丁巨筭法今有布九千三百八十四疋出關稅之每三十尺稅布一尺今共稅訖三百一十三疋𨚫貼與客人鈔一兩七錢問每疋價多少答曰八兩五錢疋法二丈八尺下布以二丈八尺乗之得二十六萬二千七百五十二尺爲實以三十尺為法除之得八千七百五十八尺四寸為合稅之布也寄左又下稅布三百一十三疋以二丈八尺乗之得八千七百六十四尺以合稅布直减之餘多客人布五尺六寸𨚫貼與鈔一兩七錢又下布一疋二丈八尺以一兩七錢加之為實以五尺六寸為法除之得一疋之錢詳明筭法元有銀一千七百二十八兩出關稅之九而取一已稅了銀二百兩𨚫貼得鈔一百兩今將銀五十八兩賣之問該鈔幾何答曰七百二十五兩
