body:
  text: 之爲實又以八尺與三丈二尺相併得四十尺為法除實見買紅花羅也又下買紅花羅以二斤因之爲實以八尺除之得斤下有分加六爲兩見紅花也又下總尺以染羅三丈二尺乗之爲實以前併四十尺爲法除實得染羅嚴恭通原筭法今有絹一疋買紫草三十斤染絹二丈四尺今𨚫有絹七疋欲减絹買紫草還自染絹問减絹買草染絹各若干答曰减絹四疋一丈五尺買紫草一百三十一斤四兩染絹二疋二丈五尺術曰置絹七疋以四十尺通之得二百八十尺以乗買草絹四十尺得一萬一千二百尺併本絹得六十四尺為法除之得减絹數别以二百八十尺乗草三十斤得八千四百斤仍用六十四尺爲法除之得買草數又以二百八十尺乗染絹二十四尺得六千七百二十尺仍用前法除之得染絹數合前問今有絲一斤八兩換絹一疋即四十尺及將絲九兩貼錢四兩得絹二丈今有錢五兩問買絹得若干答曰六尺二寸五分
