body:
  text: 九章筭經今有田一畆收粟六升太半升今有田一頃二十六畆一百五十九步問收粟幾何答曰八斛四斗四升一十二分升之五術曰以畆二百四十步爲法以六升太半升乗今有田積步為實實如法得粟數按此術亦今有之義以一畆步數為所有率六升太半升爲所來率今有田積步爲所有數而今有之即得錦囊啓源今有秋粮地二十三頃四十五畆共該正耗二百五十石九斗一升五合照依地畆又科下秋粮五百二十三石七斗六升半問該地若干答曰四十八頃九十五畆今有上號三梭布三百六十五疋共得净花四千五百六十二斤八兩疋法二丈四尺只有净花五千三百五十八馱四十四斤一兩每馱一百二十斤該三梭多少答曰五萬一千四百四十疋七尺八寸法曰下只有花在地兩用斤分馱法加二共見六十四萬三千四斤六釐二毫半用三梭布乗之得二億三千四百六十九萬六千四百八十二斤八分一釐二毫半為實用原净花作法除之見五萬一千四百四
