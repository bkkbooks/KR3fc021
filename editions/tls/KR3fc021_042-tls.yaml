body:
  text: 十疋三分二釐半零數用疋法二丈四尺乗之得七尺八寸合此法是異乗同除帶馱法斤秤并端疋也今本郡庫内收訖净花一十萬三千四十五馱一鈞一秤一十一斤一十三兩只云每花地七畆帶加耗納着二斤一兩問該地幾頃答曰四十一萬九千六百七十六頃一十一畆法曰置收到净花在地馱數内加二見一千二百三十六萬五千四百斤加入鈞秤斤兩兩用斤分共見一千二百三十六萬五千四百五十六斤八分一釐二毫半以畆數乗之為實用納花二斤一兩兩用斤分作法除之得所求頃畆也合問但遇相應之法准此求也詳明等法元雇車一兩議行道一千里載重一千二百斤與鈔七十五兩今添重三百六十斤行一千三百里問與鈔幾何答曰一百二十六兩七錢五分法曰置元載重一千二百斤以元行道一千里乗之得一百二十萬斤為法别置元載重一千二百斤搭上今添重三百六十斤共一千五百六十斤以元價七十五兩乗之得一十一萬七千又以今行道一千三百里乗之得一萬五千二百一十𨚫以一百二十萬斤為法除之得今
