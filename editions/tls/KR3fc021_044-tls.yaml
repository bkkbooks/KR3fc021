body:
  text: 合與鈔數透簾細草草曰元與錢七千五百乗今行道一千三百里得九百七十五萬又以今載重一千五百六十乗之得一百五十二億一千萬爲實元行道一千里乗元載重一千二百斤得一百二十萬為法除之得今與脚錢合問丁巨筭法此兩頭交易也以今行道乗今載重與元與鈔相乗為實𨚫以元行道乗元載重爲法除之如减斤重减行道數皆同此法此雙頭交易乗除也有草道重錢元雇車一兩議行道一千里載重一千二百斤與鈔七十五兩今增重四百九十二斤與鈔六十七兩六錢八分行道幾何答曰六百四十里法曰置今與鈔六十七兩六錢八分以元行道一千里乗之得六萬七千六百八十又以元載重一千二百斤乗之行八千一百二十一萬六千别置元載一千二百斤搭上今添四百九十二斤共一千六百九十二斤又以元價七十五兩乗之得一十二萬六千九百為法以此除八千一百二十一萬六千得今合行里數透簾細草草曰元行道一千乗今與錢六千七百六十八文得六百七十六萬八千以元載重一千二
