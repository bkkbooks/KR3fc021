body:
  text: 百乗之得八十一億二千一百六十萬爲實今載重一千六百九十二乗元與錢七千五百得一千二百六十九萬為法除之合問丁巨筭法以元行道乗元載重與今與鈔相乗為實𨚫以元與鈔乗今載重為法除之一元雇車一兩議行道一千里載重一千二百斤與鈔七十五兩今與鈔七十六兩五錢行一千七百里問載重幾何答曰七百二十斤法曰置元載重以元行道乗之得一百二十萬又以今與鈔七十六兩五錢乗之侍九千一百八十萬别置今行道以元與鈔乗之得一十二萬七千五百爲法以此除九千一百八十萬即得合載斤數透簾細草草曰元載重乗元行道得一百二十萬以今與錢七千六百五十乗之得九十一億八千萬為實今行道一千七百乗元與錢七千五百得一千二百七十五萬爲法除之合問丁巨筭法以元載重乗元行道與今與鈔相乗為實𨚫以今行道乗元與鈔爲法除之一今有雇車一兩行道一千里載重一千二百斤與錢七貫五百
