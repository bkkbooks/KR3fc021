body:
  text: 九章筭經今有取保一歲價錢二千五百今先取一千二百問當作日幾何答曰一百六十九日二十五分日之三十三術曰以價錢為法以一歲三百五十四日乗先取錢數爲實實如法得日數按此術亦今有之義以價為所有率一歲日數爲所求率取錢為所有數而今有之即得今有貸人千錢月息三十今有貸人七百五十錢九日歸之問息幾何答曰六錢四分錢之三術曰以月三十日乗千錢爲法以三十日乗千錢為法者得三萬是為貸人錢三萬一日息三十也以息三十乗今所貸錢數又以九日乗之為實實如法得一錢以九日乗今所貸錢為今一日所有錢於今有術為所有數息三十為所求率三萬錢為所有率此又可以一月三十日約息三十錢為十分一日以乗今一日所有錢為實千錢為法為率者當等之於一也故三十日或可乗本或可約息皆所以等之也楊輝詳解解題若亡貸錢一貫月息三十今貸七百五十求問息者即與前題同今題添上九日歸之不過要分兩截以貸錢一貫月息三十作不要者為法以今貸七百五十求九日之息作要者乗三十為實題雖與前
