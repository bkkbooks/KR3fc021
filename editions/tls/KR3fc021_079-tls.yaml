body:
  text: 解題菽麥為問分身為法分率術曰共物爲實以賤率乗之俱為賤價以减總錢餘為貴實貴物所多之數貴賤二率相减餘為法求見一價所多之差除之先見貴物以貴物减總數餘為賤也草曰共物為實菽麥共三百石以賤率乗之菽賤每石七百八十五文乗得二百三十五貫五百文以减總錢二百九十七貫餘為貴實六十一貫五百貴賤二率相减餘為法菽石價七百八十五麥石價一貫一百六十相减餘三百七十五為法除之以法除六十一貫五百文先得貴物麥一百六十四石以貴物麥也减總數菽麥總數餘為賤實菽得
