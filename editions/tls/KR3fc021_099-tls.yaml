body:
  text: 今有鷄翁一直五文鷄母一直三文鷄雛三直一文凡一百文買鷄百隻問翁母雛各幾何答曰鷄翁八隻直四十文鷄母十一隻直三十三文鷄雛八十一隻直一十七文張丘建篡經術云鷄翁每增四鷄母每减七鷄雛每益三謂已成數上增减也本經自云疑其從來闕文流傳既乆無可考證今將細草叅考於已筭出數上增减正無本法原草曰置錢一百文爲實又置鷄翁一鷄母一各以鷄雛三因之鷄翁得三鷄母得三并鷄雛三併之共得九為法除實得十一爲鷄母數不盡一返减下法九餘八為鷄翁數别列鷄都數一百隻减去鷄翁八鷄母十一餘八十一爲鷄雛數置翁母雛各價因之合問引前法草曰置所答數鷄翁增四得十二隻鷄母减七得四隻鷄雛益三得八十四隻共百鷄合問出錢一百買温柑緑橘匾橘共一百枚只云温柑一枚七文緑橘一枚三文匾橘三枚一文問各買幾何答曰温柑六枚計四十二文緑橘十枚計三十文匾橘八十四枚計二十八文
