body:
  text: 辯古通源筭草曰置錢一百以三因爲三百分内减共數一百枚餘二百分爲實三因温柑價得二十一内减一餘二十分又三因緑橘價得九内减一餘八分併之得二十八爲法除實得六枚乃温柑緑橘各六枚之數實餘三十二分以原法二十八减去温柑二十分餘八除實得四加先得緑橘共十枚之數以温柑緑橘共十六枚减都數一百餘八十四即匾橘之數嚴恭通原笲法今有錢三十五兩四錢買到桃子四百箇李子三百箇棗子二百箇只云桃子一箇價錢可比李子八箇比棗子四十箇問三色各價若干答曰桃子每箇八分計錢三十二兩李子每箇一分計錢三兩棗子每箇二釐計錢四錢術曰置李子三百箇以八除之得三十七箇半棗子二百箇以四十除之得五箇併桃子共四百四十二箇半爲法置錢三十五兩四錢為實以法除之得八分爲桃子每箇價又以八除得一分爲李子每箇價又以四十除得二釐為棗子每箇價各以原買箇數乗之得總價合前問今有綾一百五十疋羅三百疋絹四百五十疋總該價錢二萬九千二百
