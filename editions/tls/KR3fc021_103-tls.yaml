body:
  text: 八十兩只云綾疋價比羅疋價較多四兩七錢又羅疋價比絹疋價較多一十三兩五錢問綾羅絹各價若干答曰綾疋價四十三兩二錢羅疋價三十八兩五錢絹疋價二十五兩術曰列羅三百疋以一十三兩五錢相乗得四千五十兩又綾一百五十疋以一十八兩二錢相乗得二千七百三十兩併之得六千七百八十兩以總價减餘得二萬二千五百兩爲實以三項疋數併之得九百疋爲法除之得絹疋價增上一十三兩五錢是羅疋價又增四兩七錢是綾疋價合前問今有錢一千八兩買到絲綿綫共三百六十兩只云其中絲三綿二線一其線一兩價及綿價一兩六錢及絲價二兩問三色併價各若干答曰絲一百八十兩每兩價錢二兩二錢四分綿一百二十兩每兩價錢二兩八錢線六十兩每兩價錢四兩四錢八分術曰先列絲綿綫共三百六十兩爲三位頭位三乗中位二乗下位一乗副併三二一得六分爲法各除之頭位是絲中位是綿下位是線以二兩除頭位得九十又一兩六錢除中位得七十五連下位併得二百
